server:
  port: 8082

spring:
  application:
    name: ms-usuarios

  datasource:
    url: jdbc:mysql://mysql-db:3306/canchas_db?createDatabaseIfNotExist=true
    username: root
    password: "root" 
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka 
    fetch-registry: true

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.canchapro: DEBUG