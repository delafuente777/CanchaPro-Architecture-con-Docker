services:
  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"
    networks:
      - canchapro-network

  mysql-db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: usuarios_db
    networks:
      - canchapro-network

  ms-usuarios:
    build: ./ms-usuarios
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/usuarios_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - canchapro-network
    depends_on:
      mysql-db:
        condition: service_started
      eureka-server:
        condition: service_started

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    networks:
      - canchapro-network
    depends_on:
      - eureka-server

  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/auth_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - canchapro-network
    depends_on:
      mysql-db:
        condition: service_started
      eureka-server:
        condition: service_started

  ms-canchas:
    build: ./ms-canchas
    ports:
      - "8083:8083"
    networks:
      - canchapro-network
    depends_on:
      - eureka-server

  ms-disponibilidad:
    build: ./ms-disponibilidad
    ports:
      - "8085:8085"
    networks:
      - canchapro-network
    depends_on:
      - eureka-server

  ms-pagos:
    build: ./ms-pagos
    ports:
      - "8086:8086"
    networks:
      - canchapro-network
    depends_on:
      - eureka-server

  ms-reservas:
    build: ./ms-reservas
    ports:
      - "8087:8087"
    networks:
      - canchapro-network
    depends_on:
      - eureka-server

  ms-notificaciones:
    build: ./ms-notificaciones
    ports:
      - "8088:8088"
    networks:
      - canchapro-network
    depends_on:
      - eureka-server

  ms-calificaciones:
    build: ./ms-calificaciones
    ports:
      - "8089:8089"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/calificaciones_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - canchapro-network
    depends_on:
      mysql-db:
        condition: service_started
      eureka-server:
        condition: service_started

  ms-reportes:
    build: ./ms-reportes
    ports:
      - "8090:8090"
    networks:
      - canchapro-network
    depends_on:
      - eureka-server

networks:
  canchapro-network:
    driver: bridge
